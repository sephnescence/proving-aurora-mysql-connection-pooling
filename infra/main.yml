AWSTemplateFormatVersion: '2010-09-09'
Description: Main stack — VPCs, EKS, Aurora x2, RDS Proxy, IAM, CloudWatch

Parameters:
  ImageTagPooled:
    Type: String
  ImageTagUnpooled:
    Type: String

Resources:
  # ── VPC A (EKS + Pooled Aurora + RDS Proxy) ─────────────────────────────────

  VpcA:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{ Key: Name, Value: aurora-pooling-poc-vpc-a }]

  VpcAPublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcA
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        [
          { Key: Name, Value: vpc-a-public-a },
          { Key: 'kubernetes.io/role/elb', Value: '1' },
        ]

  VpcAPublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcA
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        [
          { Key: Name, Value: vpc-a-public-b },
          { Key: 'kubernetes.io/role/elb', Value: '1' },
        ]

  VpcAPrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcA
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        [
          { Key: Name, Value: vpc-a-private-a },
          { Key: 'kubernetes.io/role/internal-elb', Value: '1' },
        ]

  VpcAPrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcA
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        [
          { Key: Name, Value: vpc-a-private-b },
          { Key: 'kubernetes.io/role/internal-elb', Value: '1' },
        ]

  IgwA:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{ Key: Name, Value: aurora-pooling-poc-igw-a }]

  IgwAAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VpcA
      InternetGatewayId: !Ref IgwA

  ElasticIpA:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt ElasticIpA.AllocationId
      SubnetId: !Ref VpcAPublicSubnetA
      Tags: [{ Key: Name, Value: aurora-pooling-poc-nat-a }]

  PublicRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcA

  PublicRouteA:
    Type: AWS::EC2::Route
    DependsOn: IgwAAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IgwA

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VpcAPublicSubnetA
      RouteTableId: !Ref PublicRouteTableA

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VpcAPublicSubnetB
      RouteTableId: !Ref PublicRouteTableA

  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcA

  PrivateRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayA

  PrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VpcAPrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  PrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VpcAPrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableA

  # ── VPC B (Unpooled Aurora only) ────────────────────────────────────────────

  VpcB:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.1.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{ Key: Name, Value: aurora-pooling-poc-vpc-b }]

  VpcBPrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcB
      CidrBlock: 10.1.0.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags: [{ Key: Name, Value: vpc-b-private-a }]

  VpcBPrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcB
      CidrBlock: 10.1.1.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags: [{ Key: Name, Value: vpc-b-private-b }]

  # ── VPC Peering ─────────────────────────────────────────────────────────────

  VpcPeeringAB:
    Type: AWS::EC2::VPCPeeringConnection
    Properties:
      VpcId: !Ref VpcA
      PeerVpcId: !Ref VpcB
      Tags: [{ Key: Name, Value: aurora-pooling-poc-peering-ab }]

  PeeringRouteAtoB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 10.1.0.0/16
      VpcPeeringConnectionId: !Ref VpcPeeringAB

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcB

  PeeringRouteBtoA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 10.0.0.0/16
      VpcPeeringConnectionId: !Ref VpcPeeringAB

  VpcBPrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VpcBPrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableB

  VpcBPrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref VpcBPrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

# ── Security Groups ──────────────────────────────────────────────────────────

EksNodeSG:
  Type: AWS::EC2::SecurityGroup
  Properties:
    GroupDescription: EKS worker node SG
    VpcId: !Ref VpcA
    SecurityGroupIngress: []
    Tags: [{ Key: Name, Value: aurora-pooling-poc-eks-node-sg }]

PooledAuroraSG:
  Type: AWS::EC2::SecurityGroup
  Properties:
    GroupDescription: Pooled Aurora SG
    VpcId: !Ref VpcA
    SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 3306
        ToPort: 3306
        SourceSecurityGroupId: !Ref EksNodeSG
    Tags: [{ Key: Name, Value: aurora-pooling-poc-pooled-aurora-sg }]

RdsProxySG:
  Type: AWS::EC2::SecurityGroup
  Properties:
    GroupDescription: RDS Proxy SG
    VpcId: !Ref VpcA
    SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 3306
        ToPort: 3306
        SourceSecurityGroupId: !Ref EksNodeSG
    Tags: [{ Key: Name, Value: aurora-pooling-poc-rds-proxy-sg }]

UnpooledAuroraSG:
  Type: AWS::EC2::SecurityGroup
  Properties:
    GroupDescription: Unpooled Aurora SG
    VpcId: !Ref VpcB
    SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 3306
        ToPort: 3306
        CidrIp: 10.0.0.0/16
    Tags: [{ Key: Name, Value: aurora-pooling-poc-unpooled-aurora-sg }]

# ── Pooled Aurora Serverless v2 ──────────────────────────────────────────────

PooledAuroraSubnetGroup:
  Type: AWS::RDS::DBSubnetGroup
  Properties:
    DBSubnetGroupDescription: Pooled Aurora subnet group
    SubnetIds:
      - !Ref VpcAPrivateSubnetA
      - !Ref VpcAPrivateSubnetB

PooledAuroraCluster:
  Type: AWS::RDS::DBCluster
  Properties:
    Engine: aurora-mysql
    EngineVersion: '8.0.mysql_aurora.3.04.0'
    DatabaseName: pooling_poc
    MasterUsername: admin
    ManageMasterUserPassword: true
    DBSubnetGroupName: !Ref PooledAuroraSubnetGroup
    VpcSecurityGroupIds:
      - !Ref PooledAuroraSG
    ServerlessV2ScalingConfiguration:
      MinCapacity: 0.5
      MaxCapacity: 1
    StorageEncrypted: true

PooledAuroraInstance:
  Type: AWS::RDS::DBInstance
  Properties:
    Engine: aurora-mysql
    DBInstanceClass: db.serverless
    DBClusterIdentifier: !Ref PooledAuroraCluster

# ── Unpooled Aurora Serverless v2 ───────────────────────────────────────────

UnpooledAuroraSubnetGroup:
  Type: AWS::RDS::DBSubnetGroup
  Properties:
    DBSubnetGroupDescription: Unpooled Aurora subnet group
    SubnetIds:
      - !Ref VpcBPrivateSubnetA
      - !Ref VpcBPrivateSubnetB

UnpooledAuroraCluster:
  Type: AWS::RDS::DBCluster
  Properties:
    Engine: aurora-mysql
    EngineVersion: '8.0.mysql_aurora.3.04.0'
    DatabaseName: pooling_poc
    MasterUsername: admin
    ManageMasterUserPassword: true
    DBSubnetGroupName: !Ref UnpooledAuroraSubnetGroup
    VpcSecurityGroupIds:
      - !Ref UnpooledAuroraSG
    ServerlessV2ScalingConfiguration:
      MinCapacity: 0.5
      MaxCapacity: 1
    StorageEncrypted: true

UnpooledAuroraInstance:
  Type: AWS::RDS::DBInstance
  Properties:
    Engine: aurora-mysql
    DBInstanceClass: db.serverless
    DBClusterIdentifier: !Ref UnpooledAuroraCluster

# ── RDS Proxy ────────────────────────────────────────────────────────────────

RdsProxyRole:
  Type: AWS::IAM::Role
  Properties:
    RoleName: aurora-pooling-poc-rds-proxy-role
    AssumeRolePolicyDocument:
      Version: '2012-10-17'
      Statement:
        - Effect: Allow
          Principal:
            Service: rds.amazonaws.com
          Action: sts:AssumeRole
    Policies:
      - PolicyName: SecretsManagerRead
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
                - secretsmanager:DescribeSecret
              Resource: !GetAtt PooledAuroraCluster.MasterUserSecret.SecretArn

RdsProxy:
  Type: AWS::RDS::DBProxy
  Properties:
    DBProxyName: aurora-pooling-poc-proxy
    EngineFamily: MYSQL
    RoleArn: !GetAtt RdsProxyRole.Arn
    Auth:
      - AuthScheme: SECRETS
        SecretArn: !GetAtt PooledAuroraCluster.MasterUserSecret.SecretArn
        IAMAuth: DISABLED
    VpcSubnetIds:
      - !Ref VpcAPrivateSubnetA
      - !Ref VpcAPrivateSubnetB
    VpcSecurityGroupIds:
      - !Ref RdsProxySG

RdsProxyTargetGroup:
  Type: AWS::RDS::DBProxyTargetGroup
  Properties:
    DBProxyName: !Ref RdsProxy
    TargetGroupName: default
    DBClusterIdentifiers:
      - !Ref PooledAuroraCluster
    ConnectionPoolConfigurationInfo:
      MaxConnectionsPercent: 100
      MaxIdleConnectionsPercent: 50

# ── EKS Cluster ──────────────────────────────────────────────────────────────

EksRole:
  Type: AWS::IAM::Role
  Properties:
    RoleName: aurora-pooling-poc-eks-role
    AssumeRolePolicyDocument:
      Version: '2012-10-17'
      Statement:
        - Effect: Allow
          Principal:
            Service: eks.amazonaws.com
          Action: sts:AssumeRole
    ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

EksNodeRole:
  Type: AWS::IAM::Role
  Properties:
    RoleName: aurora-pooling-poc-eks-node-role
    AssumeRolePolicyDocument:
      Version: '2012-10-17'
      Statement:
        - Effect: Allow
          Principal:
            Service: ec2.amazonaws.com
          Action: sts:AssumeRole
    ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
      - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
      - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

EksCluster:
  Type: AWS::EKS::Cluster
  Properties:
    Name: aurora-pooling-poc-eks
    Version: '1.32'
    RoleArn: !GetAtt EksRole.Arn
    ResourcesVpcConfig:
      SubnetIds:
        - !Ref VpcAPrivateSubnetA
        - !Ref VpcAPrivateSubnetB
      SecurityGroupIds:
        - !Ref EksNodeSG
      EndpointPublicAccess: true
      EndpointPrivateAccess: true

EksNodeGroup:
  Type: AWS::EKS::Nodegroup
  Properties:
    ClusterName: !Ref EksCluster
    NodegroupName: aurora-pooling-poc-nodes
    NodeRole: !GetAtt EksNodeRole.Arn
    Subnets:
      - !Ref VpcAPrivateSubnetA
      - !Ref VpcAPrivateSubnetB
    InstanceTypes:
      - t3.small
    ScalingConfig:
      MinSize: 1
      MaxSize: 1
      DesiredSize: 1

  # ── IRSA: ESO ────────────────────────────────────────────────────────────────

  EsoIrsaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: aurora-pooling-poc-eso-irsa-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/${EksCluster.OpenIdConnectIssuerUrl}'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                '${EksCluster.OpenIdConnectIssuerUrl}:aud': sts.amazonaws.com
                '${EksCluster.OpenIdConnectIssuerUrl}:sub': 'system:serviceaccount:pooling-poc:eso-service-account'
      Policies:
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !GetAtt PooledAuroraCluster.MasterUserSecret.SecretArn
                  - !GetAtt UnpooledAuroraCluster.MasterUserSecret.SecretArn

  # ── IRSA: ALB Controller ─────────────────────────────────────────────────────

  AlbControllerIrsaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: aurora-pooling-poc-alb-controller-irsa-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/${EksCluster.OpenIdConnectIssuerUrl}'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                '${EksCluster.OpenIdConnectIssuerUrl}:aud': sts.amazonaws.com
                '${EksCluster.OpenIdConnectIssuerUrl}:sub': 'system:serviceaccount:kube-system:aws-load-balancer-controller'
      ManagedPolicyArns:
        - !Sub 'arn:aws:iam::${AWS::AccountId}:policy/AWSLoadBalancerControllerIAMPolicy'

  # ── IRSA: Fluent Bit ─────────────────────────────────────────────────────────

  FluentBitIrsaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: aurora-pooling-poc-fluent-bit-irsa-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/${EksCluster.OpenIdConnectIssuerUrl}'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                '${EksCluster.OpenIdConnectIssuerUrl}:aud': sts.amazonaws.com
                '${EksCluster.OpenIdConnectIssuerUrl}:sub': 'system:serviceaccount:amazon-cloudwatch:fluent-bit'
      Policies:
        - PolicyName: CloudWatchLogsWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: '*'

  # ── IAM: Artillery Role (GitHub OIDC) ────────────────────────────────────────

  ArtilleryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: aurora-pooling-poc-artillery-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated:
                Fn::ImportValue: aurora-pooling-poc-bootstrap-DeployRoleArn
            Action: sts:AssumeRole
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: 'repo:*:ref:refs/heads/main'
      Policies:
        - PolicyName: ArtilleryPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub 'arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/aurora-pooling-poc/*'
              - Effect: Allow
                Action:
                  - logs:StartQuery
                  - logs:GetQueryResults
                  - logs:DescribeLogGroups
                Resource: '*'

  # ── CloudWatch Log Groups ────────────────────────────────────────────────────

  PooledLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aurora-pooling-poc/pooled-app
      RetentionInDays: 7

  UnpooledLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aurora-pooling-poc/unpooled-app
      RetentionInDays: 7

  # ── CloudWatch Dashboard ─────────────────────────────────────────────────────

  PoolingDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: aurora-pooling-poc
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "log",
              "properties": {
                "title": "Pooled — sequential",
                "query": "SOURCE '/aurora-pooling-poc/pooled-app' | fields @timestamp, testType, rowCount, rows | filter testType = \"sequential\" | sort @timestamp desc | limit 50",
                "region": "${AWS::Region}",
                "view": "table",
                "period": 3600
              }
            },
            {
              "type": "log",
              "properties": {
                "title": "Pooled — concurrent",
                "query": "SOURCE '/aurora-pooling-poc/pooled-app' | fields @timestamp, testType, rowCount, rows | filter testType = \"concurrent\" | sort @timestamp desc | limit 50",
                "region": "${AWS::Region}",
                "view": "table",
                "period": 3600
              }
            },
            {
              "type": "log",
              "properties": {
                "title": "Unpooled — sequential",
                "query": "SOURCE '/aurora-pooling-poc/unpooled-app' | fields @timestamp, testType, rowCount, rows | filter testType = \"sequential\" | sort @timestamp desc | limit 50",
                "region": "${AWS::Region}",
                "view": "table",
                "period": 3600
              }
            },
            {
              "type": "log",
              "properties": {
                "title": "Unpooled — concurrent",
                "query": "SOURCE '/aurora-pooling-poc/unpooled-app' | fields @timestamp, testType, rowCount, rows | filter testType = \"concurrent\" | sort @timestamp desc | limit 50",
                "region": "${AWS::Region}",
                "view": "table",
                "period": 3600
              }
            }
          ]
        }

Outputs:
  PooledDbHost:
    Value: !GetAtt RdsProxy.Endpoint
    Export:
      Name: aurora-pooling-poc-PooledDbHost
  UnpooledDbHost:
    Value: !GetAtt UnpooledAuroraCluster.Endpoint.Address
    Export:
      Name: aurora-pooling-poc-UnpooledDbHost
  PooledDbSecretArn:
    Value: !GetAtt PooledAuroraCluster.MasterUserSecret.SecretArn
    Export:
      Name: aurora-pooling-poc-PooledDbSecretArn
  UnpooledDbSecretArn:
    Value: !GetAtt UnpooledAuroraCluster.MasterUserSecret.SecretArn
    Export:
      Name: aurora-pooling-poc-UnpooledDbSecretArn
  EsoRoleArn:
    Value: !GetAtt EsoIrsaRole.Arn
    Export:
      Name: aurora-pooling-poc-EsoRoleArn
  AlbControllerRoleArn:
    Value: !GetAtt AlbControllerIrsaRole.Arn
    Export:
      Name: aurora-pooling-poc-AlbControllerRoleArn
  FluentBitRoleArn:
    Value: !GetAtt FluentBitIrsaRole.Arn
    Export:
      Name: aurora-pooling-poc-FluentBitRoleArn
  ArtilleryRoleArn:
    Value: !GetAtt ArtilleryRole.Arn
    Export:
      Name: aurora-pooling-poc-ArtilleryRoleArn
  PooledLogGroupName:
    Value: !Ref PooledLogGroup
    Export:
      Name: aurora-pooling-poc-PooledLogGroupName
  UnpooledLogGroupName:
    Value: !Ref UnpooledLogGroup
    Export:
      Name: aurora-pooling-poc-UnpooledLogGroupName
