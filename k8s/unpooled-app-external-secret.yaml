apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: unpooled-secret-store
  namespace: pooling-poc
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: eso-service-account
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: unpooled-db-external-secret
  namespace: pooling-poc
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: unpooled-secret-store
    kind: SecretStore
  target:
    name: unpooled-db-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: ${UNPOOLED_DB_SECRET_ARN}
        property: password
