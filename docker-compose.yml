services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: pooling_poc
      MYSQL_USER: admin
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pooled-app:
    build:
      context: .
      dockerfile: apps/pooled-app/Dockerfile
    ports:
      - '3000:3000'
    environment:
      DB_HOST: mysql
      DB_PORT: '3306'
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: pooling_poc
      DB_SSL: 'false'
      DB_CONNECTION_MODE: persistent
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3000/health',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  unpooled-app:
    build:
      context: .
      dockerfile: apps/unpooled-app/Dockerfile
    ports:
      - '3001:3001'
    environment:
      DB_HOST: mysql
      DB_PORT: '3306'
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: pooling_poc
      DB_SSL: 'false'
      DB_CONNECTION_MODE: per-request
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3001/health',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
